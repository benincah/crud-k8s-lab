replicaCount: 2

image:
  repository: localhost:5001/crud-k8s-lab
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  host: crud-app.local

app:
  db:
    host: postgres
    port: 5432
    name: crudlab
    user: postgres
    password: postgres
  minio:
    url: http://minio:9000
    accessKey: minioadmin
    secretKey: minioadmin
    bucket: produtos

postgres:
  enabled: true

minio:
  enabled: true
  ingress:
    enabled: true
    host: minio.local

pgadmin:
  enabled: true
  email: admin@admin.com
  password: admin
  ingress:
    enabled: true
    host: pgadmin.local

serviceMonitor:
  enabled: true

efk:
  enabled: true
  ingress:
    enabled: true
    host: kibana.local
