apiVersion: v1
kind: Namespace
metadata:
  name: crud-lab
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: crud-lab
type: Opaque
stringData:
  POSTGRES_DB: crudlab
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: crud-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: crud-lab
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
